# Keep Supabase Database Alive
# Prevents the Free tier project from going into "pause" mode after 7 days of inactivity
# This workflow pings the Supabase REST API every 2 days

name: Keep Supabase Alive

on:
  schedule:
    # Run every 2 days at midnight UTC
    - cron: '0 0 */2 * *'
  
  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    env:
      HAS_SECRET: ${{ secrets.SUPABASE_ANON_KEY != '' }}
    
    steps:
      - name: Ping Supabase Public Health (No Secrets Required)
        run: |
          echo "Pinging health endpoints to ensure Vercel sees the project as active..."
          
          # Ping the Auth Health (always public)
          curl -s -o /dev/null -w "Auth Health: %{http_code}\n" \
            "https://nflmoaclnyjwuloydmmv.supabase.co/auth/v1/health"
          
          # Ping the REST Root (returns 401 if no key, but still signals activity to the instance)
          curl -s -o /dev/null -w "REST Root: %{http_code}\n" \
            "https://nflmoaclnyjwuloydmmv.supabase.co/rest/v1/"
          echo "✅ Public pings completed."

      - name: Ping Supabase REST API (Requires SUPABASE_ANON_KEY secret)
        if: env.HAS_SECRET == 'true'
        run: |
          echo "Pinging REST API with credentials..."
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            "https://nflmoaclnyjwuloydmmv.supabase.co/rest/v1/")
          echo "Response code: $response"

      - name: Log timestamp
        run: |
          echo "Keep-alive ping completed at: $(date -u)"
